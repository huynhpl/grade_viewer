[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Bundle the JSON seed alongside the compiled functions.
  included_files = ["netlify/functions/_data/**"]

[dev]
  framework = "vite"
  targetPort = 5173

# SPA fallback: every non-API, non-asset route serves index.html.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
